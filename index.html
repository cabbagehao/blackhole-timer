<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Black Hole Timer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="blackhole" aria-label="Animated black hole timer preview"></canvas>

      <section class="control-panel" aria-label="Black hole timer controls">
        <div class="panel-header">
          <div class="title-block">
            <h1>Black Hole Timer</h1>
            <p class="summary">
              The longer the work session runs, the larger the black hole grows.
              When it fills the scene, it is time to step away.
            </p>
          </div>
          <div class="panel-actions">
            <button id="panelToggle" class="panel-toggle" type="button" aria-expanded="true" aria-label="Collapse controls">
              <svg class="icon-expand" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M7 17 17 7" />
                <path d="M13 7h4v4" />
                <path d="M11 17H7v-4" />
              </svg>
              <svg class="icon-collapse" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M6.5 17.5 10.5 13.5" />
                <path d="M10.5 13.5H7.5" />
                <path d="M10.5 13.5v3" />
                <path d="M17.5 6.5 13.5 10.5" />
                <path d="M13.5 10.5h3" />
                <path d="M13.5 10.5v-3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="status-row" aria-live="polite">
          <div>
            <span class="label">Focus time</span>
            <strong id="elapsed">00:00</strong>
          </div>
          <div>
            <span class="label">Intensity</span>
            <strong id="intensity">0%</strong>
          </div>
          <div>
            <span class="label">State</span>
            <strong id="state">Ready</strong>
          </div>
        </div>

        <div class="meter" aria-hidden="true">
          <span id="meterFill"></span>
        </div>

        <div class="controls">
          <button id="toggle" type="button">Start</button>
          <button id="reset" type="button" class="secondary">Reset</button>
        </div>

        <div class="settings">
          <label class="field-control">
            <span>Break threshold</span>
            <input id="threshold" type="range" min="1" max="60" value="25" />
            <span id="thresholdLabel">25 min</span>
            <small class="field-help">How long a focus session lasts before the black hole reaches full intensity.</small>
          </label>
          <label class="field-control">
            <span>Demo speed</span>
            <select id="speed">
              <option value="1">1x real time</option>
              <option value="3">3x</option>
              <option value="5">5x</option>
              <option value="10">10x</option>
              <option value="30">30x</option>
              <option value="120" selected>120x</option>
              <option value="600">600x</option>
            </select>
          </label>
          <label class="field-control">
            <span>Background</span>
            <select id="scene">
              <option value="reference">Dense code field</option>
              <option value="work">Workspace mockup</option>
            </select>
          </label>
        </div>

        <div class="panel-footer">
          <a
            class="github-link"
            href="https://github.com/cabbagehao/blackhole-timer"
            target="_blank"
            rel="noreferrer"
            aria-label="Open GitHub repository"
            title="Open GitHub repository"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.36 9.36 0 0 1 12 7c.85 0 1.7.12 2.5.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.07.36.32.68.95.68 1.91 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.08 10.08 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z" />
            </svg>
          </a>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
